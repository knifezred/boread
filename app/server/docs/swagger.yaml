host: localhost:8080
info:
  contact: {}
  description: 小说阅读平台后端 API
  title: Boread API
  version: "1.0"
paths:
  /api/auth/buttons:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/boread_pkg_response.Response'
            - properties:
                data:
                  items:
                    type: string
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: 当前用户按钮码集合
      tags:
      - auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登录参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/boread_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/boread_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/boread_internal_dto.LoginResponse'
              type: object
      summary: 登录
      tags:
      - auth
  /api/auth/menu:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/boread_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/boread_internal_dto.MenuResponse'
              type: object
      security:
      - BearerAuth: []
      summary: 当前用户菜单树
      tags:
      - auth
  /api/auth/userInfo:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/boread_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/boread_internal_dto.UserInfoResponse'
              type: object
      security:
      - BearerAuth: []
      summary: 当前用户信息
      tags:
      - auth
  /api/manage/dept:
    post:
      consumes:
      - application/json
      parameters:
      - description: 部门
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/boread_internal_dto.DeptRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/boread_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/boread_internal_model.SysDept'
              type: object
      security:
      - BearerAuth: []
      summary: 新增部门
      tags:
      - dept
  /api/manage/dept/{id}:
    delete:
      parameters:
      - description: 部门ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/boread_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 删除部门
      tags:
      - dept
    get:
      parameters:
      - description: 部门ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/boread_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/boread_internal_model.SysDept'
              type: object
      security:
      - BearerAuth: []
      summary: 部门详情
      tags:
      - dept
    put:
      consumes:
      - application/json
      parameters:
      - description: 部门ID
        in: path
        name: id
        required: true
        type: integer
      - description: 部门
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/boread_internal_dto.DeptRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/boread_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/boread_internal_model.SysDept'
              type: object
      security:
      - BearerAuth: []
      summary: 编辑部门
      tags:
      - dept
  /api/manage/dept/page:
    post:
      consumes:
      - application/json
      parameters:
      - description: 搜索参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/boread_internal_dto.DeptSearch'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/boread_pkg_response.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/boread_internal_dto.PageResponse'
                  - properties:
                      records:
                        items:
                          $ref: '#/definitions/boread_internal_dto.DeptNode'
                        type: array
                    type: object
              type: object
      security:
      - BearerAuth: []
      summary: 部门分页列表 (平级)
      tags:
      - dept
  /api/manage/dept/tree:
    get:
      parameters:
      - description: 部门名称
        in: query
        name: deptName
        type: string
      - description: 部门编码
        in: query
        name: deptCode
        type: string
      - description: '状态: 1启用 2禁用'
        in: query
